services:
  app:
    image: php:8.2-apache
    container_name: laravel_app
    restart: always
    ports:
      - "8000:80"
    volumes:
      - ./restaurant-erp-platformB-backend-main:/var/www/html
    depends_on:
      - mysql
    command: >
      bash -c "docker-php-ext-install pdo pdo_mysql &&
      echo '<VirtualHost *:80>
        DocumentRoot /var/www/html/public
        <Directory /var/www/html/public>
          AllowOverride All
          Require all granted
        </Directory>
      </VirtualHost>' > /etc/apache2/sites-enabled/000-default.conf &&
      a2enmod rewrite &&
      apache2-foreground"

  mysql:
    image: mysql:8.0
    container_name: mysql_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: restaurant_platform_b
      MYSQL_USER: laravel_user
      MYSQL_PASSWORD: laravel_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin_container
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - mysql

volumes:
  mysql_data: